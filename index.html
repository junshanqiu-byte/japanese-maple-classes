<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>枫树形态分类 · 话术手册</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            padding: 48px 24px;
            background: #080c18;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* ===== 主容器 ===== */
        .container {
            max-width: 1200px;
            width: 100%;
            background: linear-gradient(145deg, #0b1224 0%, #101a30 100%);
            border-radius: 40px;
            padding: 56px 60px 48px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(212, 175, 55, 0.08) inset;
            position: relative;
            overflow: hidden;
        }

        .container::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(212, 175, 55, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212, 175, 55, 0.015) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
        }

        /* ===== 头部 ===== */
        .header {
            text-align: center;
            margin-bottom: 48px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.12);
            padding-bottom: 28px;
        }

        .emblem {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 12px;
        }

        .emblem-line {
            width: 50px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
        }

        .emblem-icon {
            font-size: 30px;
            color: #d4af37;
            opacity: 0.7;
        }

        .main-title {
            font-family: "Playfair Display", serif;
            font-weight: 700;
            font-size: 40px;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #f6e6b0 0%, #d4af37 50%, #b8902a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 2px 40px rgba(212, 175, 55, 0.12);
        }

        .subtitle {
            font-family: "Playfair Display", serif;
            font-style: italic;
            color: rgba(255, 255, 255, 0.35);
            font-size: 17px;
            letter-spacing: 5px;
            margin-top: 4px;
            -webkit-text-fill-color: rgba(255, 255, 255, 0.35);
        }

        .subtitle span {
            color: #d4af37;
            -webkit-text-fill-color: #d4af37;
            padding: 0 4px;
        }

        /* ===== 分类区块 ===== */
        .section-block {
            margin-bottom: 44px;
        }

        .section-block:last-of-type {
            margin-bottom: 0;
        }

        .section-head {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .section-number {
            font-family: "Playfair Display", serif;
            font-weight: 700;
            font-size: 28px;
            color: rgba(212, 175, 55, 0.2);
            letter-spacing: 1px;
            min-width: 48px;
        }

        .section-title {
            font-family: "Playfair Display", serif;
            font-weight: 600;
            font-size: 24px;
            color: #f0ece4;
            letter-spacing: 2px;
        }

        .section-title-en {
            font-family: "Inter", sans-serif;
            font-size: 13px;
            font-weight: 400;
            color: rgba(212, 175, 55, 0.4);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-left: auto;
        }

        /* ===== 链接网格 ===== */
        .link-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px 14px;
            padding-left: 8px;
        }

        .link-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            text-decoration: none;
            color: rgba(255, 255, 255, 0.65);
            font-size: 15px;
            font-weight: 400;
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
        }

        .link-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(212, 175, 55, 0.2);
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .link-index {
            font-family: "Playfair Display", serif;
            font-weight: 600;
            font-size: 14px;
            color: rgba(212, 175, 55, 0.3);
            min-width: 28px;
            transition: color 0.3s ease;
        }

        .link-item:hover .link-index {
            color: rgba(212, 175, 55, 0.6);
        }

        .link-label {
            flex: 1;
        }

        /* ===== 底部 ===== */
        .footer {
            margin-top: 44px;
            padding-top: 22px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .footer-motto {
            font-family: "Playfair Display", serif;
            font-style: italic;
            color: rgba(255, 255, 255, 0.18);
            font-size: 14px;
            letter-spacing: 3px;
        }

        .footer-motto strong {
            color: #d4af37;
            font-weight: 600;
            -webkit-text-fill-color: #d4af37;
        }

        .footer-badge {
            display: flex;
            gap: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.10);
            letter-spacing: 1px;
            font-weight: 300;
        }

        .footer-badge span {
            color: rgba(212, 175, 55, 0.2);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 992px) {
            .container {
                padding: 40px 32px 36px;
                border-radius: 32px;
            }
            .main-title {
                font-size: 34px;
            }
            .link-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 20px 12px;
            }
            .container {
                padding: 28px 18px 24px;
                border-radius: 24px;
            }
            .main-title {
                font-size: 28px;
                letter-spacing: 2px;
            }
            .subtitle {
                font-size: 14px;
                letter-spacing: 4px;
            }
            .section-title {
                font-size: 20px;
            }
            .section-number {
                font-size: 22px;
                min-width: 36px;
            }
            .section-title-en {
                font-size: 11px;
            }
            .link-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 8px 10px;
                padding-left: 4px;
            }
            .link-item {
                padding: 8px 12px;
                font-size: 14px;
                border-radius: 10px;
            }
            .link-index {
                font-size: 12px;
                min-width: 22px;
            }
            .header {
                margin-bottom: 32px;
                padding-bottom: 20px;
            }
            .emblem-icon {
                font-size: 24px;
            }
            .emblem-line {
                width: 30px;
            }
            .section-block {
                margin-bottom: 32px;
            }
            .footer {
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 6px;
                margin-top: 32px;
            }
            .footer-badge {
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        @media (max-width: 420px) {
            .container {
                padding: 20px 12px 18px;
                border-radius: 20px;
            }
            .main-title {
                font-size: 22px;
            }
            .subtitle {
                font-size: 12px;
                letter-spacing: 3px;
            }
            .section-title {
                font-size: 17px;
            }
            .link-grid {
                grid-template-columns: 1fr 1fr;
                gap: 6px;
            }
            .link-item {
                padding: 8px 10px;
                font-size: 13px;
                border-radius: 8px;
            }
            .link-index {
                font-size: 11px;
                min-width: 18px;
            }
        }
    </style>
</head>
